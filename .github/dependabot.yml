version: 2

# Automated dependency-update PRs, grouped so related packages move together.
# Dependabot reads pnpm-lock.yaml for the npm ecosystem.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase
    # Wait before opening a PR for a freshly published release. pnpm v11 enforces a
    # default `minimumReleaseAge` of 1 day, so a same-day bump (e.g. the
    # @module-federation/vite 1.18.1 PR) fails `pnpm install --frozen-lockfile` in CI
    # until the package ages out. A 7-day cooldown keeps PRs comfortably past that gate
    # (patch: 3 days). Security updates ignore cooldown, so fixes still land fast.
    cooldown:
      default-days: 7
      semver-patch-days: 3
    ignore:
      # TypeScript 7.x is the new Go-based compiler; typescript-eslint 8.x declares
      # peer `typescript >=4.8.4 <6.1.0`, so its parser crashes on TS 7 internals
      # ("Cannot read properties of undefined (reading 'Cjs')"). Stay on TS 5.x until
      # typescript-eslint supports TS 7, then drop this ignore.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
    groups:
      # The TanStack Start family versions in lockstep and MUST move together —
      # a partial bump broke the SSR build (h3 / start-server-core incident).
      tanstack:
        patterns:
          - '@tanstack/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      module-federation:
        patterns:
          - '@module-federation/*'
      lint-and-format:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'prettier*'
          - 'typescript-eslint'
          - '@commitlint/*'
          - 'husky'
          - 'lint-staged'
      dev-dependencies:
        dependency-type: development
        patterns:
          - '*'
    commit-message:
      prefix: 'fix(deps)'
      prefix-development: 'chore(deps-dev)'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'ci'

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'build'
