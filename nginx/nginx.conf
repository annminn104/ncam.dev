# Production reverse proxy for the ncam micro-frontend stack.
#
# One nginx fronts the SSR host and each remote, each on its own hostname, so a
# federated entry URL (e.g. http://toonhub.localhost/remoteEntry.js) resolves the
# SAME for the browser AND for the host's server-side (SSR) fetch — the single
# origin per app removes the browser-vs-server URL split entirely.
#
# Usage (add a gateway service on the app's docker network):
#   gateway:
#     image: nginx:1.27-alpine
#     volumes: [./nginx/nginx.conf:/etc/nginx/nginx.conf:ro]
#     ports: ["80:80"]
#     depends_on: [portfolio, toonhub, mindloop, immersive-ocean]
# Then build the host with gateway URLs (no port), e.g. in .env.local:
#   TOONHUB_REMOTE_URL=http://toonhub.localhost/remoteEntry.js
#   MINDLOOP_REMOTE_URL=http://mindloop.localhost/remoteEntry.js
#   IMMERSIVE_OCEAN_REMOTE_URL=http://immersive-ocean.localhost/remoteEntry.js
# In production, swap the *.localhost server_names for real sub-domains.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

  # Immutable, long-cache for hashed assets; everything else stays fresh.
  map $uri $asset_cache {
    default "no-cache";
    "~*/assets/" "public, max-age=31536000, immutable";
  }

  upstream portfolio {
    server portfolio:9000;
  }
  upstream toonhub {
    server toonhub:9001;
  }
  upstream mindloop {
    server mindloop:9002;
  }
  upstream immersive_ocean {
    server immersive-ocean:9003;
  }

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # ── SSR host ────────────────────────────────────────────────
  server {
    listen 80 default_server;
    server_name localhost ncam.localhost;

    location / {
      proxy_pass http://portfolio;
    }
  }

  # ── Remotes (static; Module Federation is cross-origin → allow CORS) ──
  server {
    listen 80;
    server_name toonhub.localhost;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control $asset_cache always;
    location / {
      proxy_pass http://toonhub;
    }
  }

  server {
    listen 80;
    server_name mindloop.localhost;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control $asset_cache always;
    location / {
      proxy_pass http://mindloop;
    }
  }

  server {
    listen 80;
    server_name immersive-ocean.localhost;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control $asset_cache always;
    location / {
      proxy_pass http://immersive_ocean;
    }
  }
}
